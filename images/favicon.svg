<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f4fa"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="12" ry="12" fill="url(#bg)"/>
  <!-- Blue border accent -->
  <rect width="64" height="64" rx="12" ry="12" fill="none" stroke="#1a6eb5" stroke-width="2.5"/>
  <!-- NEX in red — top line -->
  <text x="32" y="30"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900" font-size="22" fill="#e31e24"
        text-anchor="middle" letter-spacing="-1">NEX</text>
  <!-- thin divider line -->
  <line x1="10" y1="34" x2="54" y2="34" stroke="#e0e8f0" stroke-width="1"/>
  <!-- GEN in blue — bottom line -->
  <text x="32" y="54"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900" font-size="22" fill="#1a6eb5"
        text-anchor="middle" letter-spacing="-1">GEN</text>
</svg>
