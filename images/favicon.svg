<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Subtle shine -->
  <rect width="64" height="32" rx="14" ry="14" fill="rgba(255,255,255,0.08)"/>
  <!-- N letter -->
  <text x="9" y="45"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900" font-size="34" fill="#ffffff">N</text>
  <!-- small "g" subscript in white/translucent -->
  <text x="38" y="50"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900" font-size="22" fill="rgba(255,255,255,0.85)">g</text>
</svg>
